<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日程候補コピペくん</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f7;
    color: #1d1d1f;
    min-height: 100vh;
    padding: 24px 16px;
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 600;
    text-align: center;
    margin-bottom: 24px;
    color: #1d1d1f;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 20px;
    align-items: start;
  }

  /* ── Calendar ── */
  .calendar-wrap {
    background: #fff;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
    width: 300px;
  }

  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .cal-header span {
    font-weight: 600;
    font-size: .95rem;
  }

  .cal-nav {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1.1rem;
    color: #555;
    padding: 4px 8px;
    border-radius: 8px;
    transition: background .15s;
  }
  .cal-nav:hover { background: #f0f0f0; }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }

  .cal-dow {
    text-align: center;
    font-size: .72rem;
    font-weight: 600;
    color: #888;
    padding: 4px 0;
  }
  .cal-dow:first-child { color: #e05; }
  .cal-dow:last-child  { color: #07f; }

  .cal-day {
    text-align: center;
    padding: 7px 0;
    border-radius: 8px;
    cursor: pointer;
    font-size: .88rem;
    transition: background .12s, color .12s;
    user-select: none;
  }
  .cal-day:hover:not(.empty):not(.selected) { background: #f0f0f0; }
  .cal-day.empty { cursor: default; }
  .cal-day.selected {
    background: #0071e3;
    color: #fff;
    font-weight: 600;
  }
  .cal-day.today:not(.selected) {
    color: #0071e3;
    font-weight: 700;
  }
  .cal-day.sun:not(.selected) { color: #e05; }
  .cal-day.sat:not(.selected) { color: #07f; }

  /* ── Right column ── */
  .right-col {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ── Date rows ── */
  .date-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .time-options {
    display: flex;
    justify-content: flex-end;
  }

  .time-options-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: .84rem;
    color: #666;
    user-select: none;
  }
  .time-options-label.disabled {
    color: #b8c3d1;
    cursor: default;
  }

  .time-options-label input {
    accent-color: #0071e3;
  }

  .date-row {
    background: #fff;
    border-radius: 12px;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,.07);
    animation: fadeIn .15s ease;
  }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; } }

  .date-label {
    font-size: .9rem;
    font-weight: 500;
    white-space: nowrap;
    min-width: 130px;
    color: #333;
  }

  .time-group {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
  }

  .tilde { color: #888; font-size: .9rem; }

  .time-error {
    font-size: .75rem;
    color: #e05;
    margin-left: 4px;
  }

  /* ── Time Picker ── */
  .tp {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .tp-hour {
    border: 1.5px solid #d0d0d5;
    border-radius: 8px;
    padding: 5px 6px;
    font-size: .9rem;
    outline: none;
    background: #fafafa;
    cursor: pointer;
    transition: border-color .15s;
    appearance: none;
    -webkit-appearance: none;
    text-align: center;
    width: 54px;
  }
  .tp-hour:focus { border-color: #0071e3; background: #fff; }
  .tp-hour.error { border-color: #e05; }

  .tp-sep { color: #555; font-weight: 600; font-size: .9rem; }

  .tp-min-sel {
    border: 1.5px solid #d0d0d5;
    border-radius: 8px;
    padding: 5px 6px;
    font-size: .9rem;
    outline: none;
    background: #fafafa;
    cursor: pointer;
    transition: border-color .15s;
    appearance: none;
    -webkit-appearance: none;
    text-align: center;
    width: 54px;
  }
  .tp-min-sel:focus { border-color: #0071e3; background: #fff; }

  .empty-hint {
    text-align: center;
    color: #aaa;
    font-size: .88rem;
    padding: 24px 0;
  }

  /* ── Output ── */
  .output-wrap {
    background: #fff;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
  }

  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    gap: 12px;
  }

  .output-label {
    font-size: .82rem;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  .copy-btn {
    background: #0071e3;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 6px 16px;
    font-size: .85rem;
    font-weight: 500;
    cursor: pointer;
    transition: background .15s, transform .1s;
  }
  .copy-btn:hover { background: #0062c4; }
  .copy-btn:active { transform: scale(.97); }
  .copy-btn.copied { background: #34c759; }

  .gcal-add-btn {
    background: #fff;
    color: #0071e3;
    border: 1.5px solid #0071e3;
    border-radius: 8px;
    padding: 6px 16px;
    font-size: .85rem;
    font-weight: 500;
    cursor: pointer;
    transition: background .15s, color .15s, transform .1s, border-color .15s;
  }
  .gcal-add-btn:hover:not(:disabled) { background: #eef6ff; }
  .gcal-add-btn:active:not(:disabled) { transform: scale(.97); }
  .gcal-add-btn:disabled {
    color: #b8c3d1;
    border-color: #d8e0ea;
    background: #fff;
    cursor: default;
  }

  .output-next {
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid #e5e5ea;
  }

  .output-next-toggle summary {
    list-style: none;
    cursor: pointer;
    font-size: .88rem;
    font-weight: 600;
    color: #555;
    display: flex;
    align-items: center;
    justify-content: space-between;
    user-select: none;
  }
  .output-next-toggle summary::-webkit-details-marker { display: none; }

  .output-next-toggle summary::after {
    content: '▾';
    font-size: .85rem;
    color: #888;
    transition: transform .15s ease;
  }
  .output-next-toggle[open] summary::after { transform: rotate(180deg); }

  .output-next-toggle.disabled summary {
    color: #b8c3d1;
    cursor: default;
  }
  .output-next-toggle.disabled summary::after { color: #c8d0da; }

  .output-next-list {
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .output-next-action {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    background: #f5f5f7;
    border-radius: 10px;
    padding: 10px 12px;
  }

  .output-next-text {
    font-size: .88rem;
    color: #333;
  }

  .output-text {
    font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    font-size: .95rem;
    line-height: 1.8;
    white-space: pre;
    color: #1d1d1f;
    min-height: 48px;
    background: #f5f5f7;
    border-radius: 8px;
    padding: 12px 14px;
  }

  .output-placeholder {
    color: #bbb;
    font-style: italic;
    font-family: -apple-system, sans-serif;
    font-size: .88rem;
  }

  /* ── Google Calendar ── */
  .gcal-toggle {
    max-width: 860px;
    margin: 20px auto 0;
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
    overflow: hidden;
  }

  .gcal-toggle summary {
    list-style: none;
    cursor: pointer;
    padding: 16px 20px;
    font-size: .95rem;
    font-weight: 600;
    color: #1d1d1f;
    display: flex;
    align-items: center;
    justify-content: space-between;
    user-select: none;
  }
  .gcal-toggle summary::-webkit-details-marker { display: none; }

  .gcal-toggle summary::after {
    content: '▾';
    font-size: .9rem;
    color: #888;
    transition: transform .15s ease;
  }
  .gcal-toggle[open] summary::after { transform: rotate(180deg); }

  .gcal-section {
    padding: 0 20px 20px;
  }

  .gcal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .gcal-header-label {
    font-size: .82rem;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  .gcal-reset-btn {
    background: none;
    border: none;
    font-size: .78rem;
    color: #aaa;
    cursor: pointer;
    font-family: inherit;
    padding: 2px 4px;
  }
  .gcal-reset-btn:hover { color: #555; }

  .gcal-frame {
    width: 100%;
    height: 500px;
    border: none;
    border-radius: 16px;
    display: block;
  }

  .gcal-setup {
    background: #f5f5f7;
    border-radius: 16px;
    padding: 24px 20px;
    text-align: center;
  }

  .gcal-setup p {
    font-size: .88rem;
    color: #555;
    margin-bottom: 16px;
    line-height: 1.7;
  }

  .gcal-setup a {
    color: #0071e3;
    text-decoration: none;
  }

  .gcal-url-row {
    display: flex;
    gap: 8px;
    max-width: 560px;
    margin: 0 auto;
  }

  .gcal-url-input {
    flex: 1;
    border: 1.5px solid #d0d0d5;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: .88rem;
    outline: none;
    font-family: inherit;
    background: #fafafa;
    min-width: 0;
  }
  .gcal-url-input:focus { border-color: #0071e3; background: #fff; }

  .gcal-save-btn {
    background: #0071e3;
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 18px;
    font-size: .88rem;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    white-space: nowrap;
    transition: background .15s;
  }
  .gcal-save-btn:hover { background: #0062c4; }

  /* ── Responsive ── */
  @media (max-width: 660px) {
    .container { grid-template-columns: 1fr; }
    .calendar-wrap { width: 100%; }
    .date-row { flex-wrap: wrap; }
    .output-header { align-items: flex-start; }
    .output-next-action { flex-wrap: wrap; }
    .gcal-frame { height: 400px; }
    .gcal-url-row { flex-direction: column; }
  }
</style>
</head>
<body>

<h1>日程候補コピペくん</h1>

<div class="container">
  <!-- Calendar -->
  <div class="calendar-wrap">
    <div class="cal-header">
      <button class="cal-nav" id="prevBtn">‹</button>
      <span id="calTitle"></span>
      <button class="cal-nav" id="nextBtn">›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <!-- Right -->
  <div class="right-col">
    <div class="time-options">
      <label class="time-options-label">
        <input type="checkbox" id="showLateHoursToggle">
        深夜帯も表示
      </label>
    </div>
    <div class="date-list" id="dateList">
      <p class="empty-hint">カレンダーから日付を選択してください</p>
    </div>
    <div class="output-wrap">
      <div class="output-header">
        <span class="output-label">生成テキスト</span>
        <button class="copy-btn" id="copyBtn">コピー</button>
      </div>
      <div class="output-text" id="outputText">
        <span class="output-placeholder">日付と時間を入力すると、ここにテキストが表示されます</span>
      </div>
      <div class="output-next">
        <details class="output-next-toggle">
          <summary>Googleカレンダーに登録</summary>
          <div class="output-next-list" id="gcalActionList"></div>
        </details>
      </div>
    </div>
  </div>
</div>

<details class="gcal-toggle" id="gcalToggle">
  <summary>Googleカレンダーを並べて表示</summary>
  <div class="gcal-section" id="gcalSection">
    <!-- JS で setup または iframe を描画 -->
  </div>
</details>

<script>
const DOW_JA = ['日','月','火','水','木','金','土'];
const LATE_HOURS_KEY = 'show_late_hours';
let showLateHours = false;

function getValidCalendarEntries(state) {
  return [...state.keys()]
    .sort()
    .map(key => state.get(key))
    .filter(entry => {
      if (!entry) return false;
      if (!entry.start && !entry.end) return true;
      return entry.start && entry.end && entry.end > entry.start;
    });
}

function formatGcalDateTime(date, time) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  const hh = time.slice(0, 2);
  const mm = time.slice(3, 5);
  return `${y}${m}${d}T${hh}${mm}00`;
}

function formatGcalAllDayDate(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}${m}${d}`;
}

function buildGcalEventUrl(entry) {
  const dates = (!entry.start && !entry.end)
    ? (() => {
        const endDate = new Date(entry.date);
        endDate.setDate(endDate.getDate() + 1);
        return `${formatGcalAllDayDate(entry.date)}/${formatGcalAllDayDate(endDate)}`;
      })()
    : `${formatGcalDateTime(entry.date, entry.start)}/${formatGcalDateTime(entry.date, entry.end)}`;

  const params = new URLSearchParams({
    action: 'TEMPLATE',
    text: '(候補)',
    dates,
    details: TextFormatter.formatLine(entry) || '',
    ctz: Intl.DateTimeFormat().resolvedOptions().timeZone
  });
  return `https://calendar.google.com/calendar/render?${params.toString()}`;
}

// ── ScheduleStore ─────────────────────────────────────────────
const ScheduleStore = (() => {
  const _state = new Map(); // key: DateKey → ScheduleEntry
  const _subs = [];

  function _notify() { _subs.forEach(cb => cb()); }

  return {
    getState() { return _state; },

    toggleDate(date, dateKey) {
      if (_state.has(dateKey)) _state.delete(dateKey);
      else _state.set(dateKey, { date, dateKey, start: '', end: '' });
      _notify();
    },

    updateTime(dateKey, start, end) {
      const entry = _state.get(dateKey);
      if (entry) { entry.start = start; entry.end = end; _notify(); }
    },

    subscribe(cb) {
      _subs.push(cb);
      return () => { const i = _subs.indexOf(cb); if (i >= 0) _subs.splice(i, 1); };
    }
  };
})();

// ── TextFormatter ─────────────────────────────────────────────
const TextFormatter = (() => {
  function getDayOfWeekJa(date) {
    return ['日','月','火','水','木','金','土'][date.getDay()];
  }

  // Returns formatted line string, or null if entry has a time validation error
  function formatLine(entry) {
    const { date, start, end } = entry;
    if (start && end && end <= start) return null; // バリデーションエラー → 除外

    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    const dow = getDayOfWeekJa(date);

    let line = `${y}/${m}/${d}(${dow})`;
    if (start || end) {
      line += ` ${start || '--:--'}~${end || '--:--'}`;
    }
    return line;
  }

  // Returns formatted text (newline-joined), or "" when state is empty
  function formatEntries(state) {
    if (state.size === 0) return '';
    const lines = [...state.keys()]
      .sort()
      .map(key => formatLine(state.get(key)))
      .filter(line => line !== null);
    return lines.join('\n');
  }

  return { formatEntries, getDayOfWeekJa, formatLine };
})();

// Calendar view state
let viewYear, viewMonth;
const now = new Date();
viewYear = now.getFullYear();
viewMonth = now.getMonth();

// ── Calendar render ──────────────────────────────────────────
function renderCalendar() {
  const title = document.getElementById('calTitle');
  title.textContent = `${viewYear}年${viewMonth + 1}月`;

  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';

  DOW_JA.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
  const todayStr = dateKey(now);
  const state = ScheduleStore.getState();

  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'cal-day empty';
    grid.appendChild(el);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const date = new Date(viewYear, viewMonth, d);
    const key = dateKey(date);
    const dow = date.getDay();

    const el = document.createElement('div');
    el.textContent = d;
    el.className = 'cal-day';
    if (dow === 0) el.classList.add('sun');
    if (dow === 6) el.classList.add('sat');
    if (key === todayStr) el.classList.add('today');
    if (state.has(key)) el.classList.add('selected');

    el.addEventListener('click', () => {
      ScheduleStore.toggleDate(date, key); // → notifies renderOutput
      el.classList.toggle('selected', ScheduleStore.getState().has(key));
      renderDateList();
    });
    grid.appendChild(el);
  }
}

function dateKey(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, '0');
  const d = String(date.getDate()).padStart(2, '0');
  return `${y}-${m}-${d}`;
}

document.getElementById('prevBtn').addEventListener('click', () => {
  viewMonth--;
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  renderCalendar();
});

document.getElementById('nextBtn').addEventListener('click', () => {
  viewMonth++;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  renderCalendar();
});

// ── Time Picker Component ─────────────────────────────────────
// Returns { el, getValue() }
// initialValue: "HH:MM" or ""
function makeTimePicker(initialValue, onChange) {
  let hour = '';      // "" | "00".."23"
  let minute = '';    // "" | "00" | "30" | custom string

  // Parse initial value
  if (initialValue && /^\d{2}:\d{2}$/.test(initialValue)) {
    hour = initialValue.slice(0, 2);
    minute = initialValue.slice(3);
  }

  const wrap = document.createElement('div');
  wrap.className = 'tp';

  // ── Hour select ──
  const hourSel = document.createElement('select');
  hourSel.className = 'tp-hour';

  const blankOpt = document.createElement('option');
  blankOpt.value = '';
  blankOpt.textContent = '--';
  hourSel.appendChild(blankOpt);

  const hourOptions = [];
  const startHour = showLateHours ? 0 : 6;
  for (let h = startHour; h <= 23; h++) {
    hourOptions.push(String(h).padStart(2, '0'));
  }
  if (hour !== '' && !hourOptions.includes(hour)) {
    hourOptions.unshift(hour);
  }

  hourOptions.forEach((value) => {
    const opt = document.createElement('option');
    opt.value = value;
    opt.textContent = value;
    hourSel.appendChild(opt);
  });
  hourSel.value = hour;
  hourSel.addEventListener('change', () => {
    hour = hourSel.value;
    onChange(getValue());
  });

  const sep = document.createElement('span');
  sep.className = 'tp-sep';
  sep.textContent = ':';

  // ── Minute select ──
  const minuteValue = (minute === '00' || minute === '30') ? minute : '00';

  const minSel = document.createElement('select');
  minSel.className = 'tp-min-sel';
  [['', '--'], ['00', '00'], ['30', '30']].forEach(([val, label]) => {
    const opt = document.createElement('option');
    opt.value = val;
    opt.textContent = label;
    minSel.appendChild(opt);
  });
  minSel.value = minuteValue;
  minute = minuteValue;

  minSel.addEventListener('change', () => {
    minute = minSel.value;
    onChange(getValue());
  });

  wrap.append(hourSel, sep, minSel);

  function setValue(nextValue) {
    if (nextValue && /^\d{2}:\d{2}$/.test(nextValue)) {
      hour = nextValue.slice(0, 2);
      minute = nextValue.slice(3);
    } else {
      hour = '';
      minute = '00';
    }
    hourSel.value = hour;
    minSel.value = (minute === '00' || minute === '30') ? minute : '00';
  }

  function getValue() {
    if (hour === '' || minute === '') return '';
    return `${hour}:${minute}`;
  }

  return { el: wrap, getValue, setValue };
}

function addOneHour(time) {
  const hour = Number(time.slice(0, 2));
  const minute = time.slice(3, 5);
  return `${String((hour + 1) % 24).padStart(2, '0')}:${minute}`;
}

// ── Date list render ─────────────────────────────────────────
function renderDateList() {
  const list = document.getElementById('dateList');
  const lateHoursToggle = document.getElementById('showLateHoursToggle');
  const lateHoursLabel = lateHoursToggle.closest('.time-options-label');
  list.innerHTML = '';

  const state = ScheduleStore.getState();
  const hasSelectedDates = state.size > 0;

  lateHoursToggle.checked = showLateHours;
  lateHoursToggle.disabled = !hasSelectedDates;
  lateHoursLabel.classList.toggle('disabled', !hasSelectedDates);

  if (!hasSelectedDates) {
    list.innerHTML = '<p class="empty-hint">カレンダーから日付を選択してください</p>';
    return;
  }

  const sortedKeys = [...state.keys()].sort();

  sortedKeys.forEach(key => {
    const entry = state.get(key);
    const { date } = entry;
    const dow = DOW_JA[date.getDay()];
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    const labelText = `${y}/${m}/${d}(${dow})`;

    const row = document.createElement('div');
    row.className = 'date-row';

    const label = document.createElement('div');
    label.className = 'date-label';
    label.textContent = labelText;

    const timeGroup = document.createElement('div');
    timeGroup.className = 'time-group';

    const errMsg = document.createElement('span');
    errMsg.className = 'time-error';

    function syncTimes(nextStart, nextEnd) {
      const s = nextStart ?? startPicker.getValue();
      const e = nextEnd ?? endPicker.getValue();
      if (s && e && e <= s) {
        errMsg.textContent = '終了 > 開始にしてください';
      } else {
        errMsg.textContent = '';
      }
      ScheduleStore.updateTime(key, s, e); // → notifies renderOutput via subscribe
    }

    function onStartTimeChange(startValue) {
      let endValue = endPicker.getValue();
      if (startValue && !endValue) {
        endValue = addOneHour(startValue);
        endPicker.setValue(endValue);
      }
      syncTimes(startValue, endValue);
    }

    function onEndTimeChange(endValue) {
      syncTimes(startPicker.getValue(), endValue);
    }

    const startPicker = makeTimePicker(entry.start, onStartTimeChange);
    const tilde = document.createElement('span');
    tilde.className = 'tilde';
    tilde.textContent = '〜';
    const endPicker = makeTimePicker(entry.end, onEndTimeChange);

    timeGroup.append(startPicker.el, tilde, endPicker.el, errMsg);
    row.append(label, timeGroup);
    list.appendChild(row);
  });
}

// ── Output render ────────────────────────────────────────────
function renderOutput() {
  const el = document.getElementById('outputText');
  const actionToggle = document.querySelector('.output-next-toggle');
  const actionList = document.getElementById('gcalActionList');
  const state = ScheduleStore.getState();
  const validEntries = getValidCalendarEntries(state);

  actionList.innerHTML = '';
  actionToggle.classList.toggle('disabled', validEntries.length === 0);
  if (validEntries.length === 0) actionToggle.open = false;

  validEntries.forEach((entry, index) => {
    const row = document.createElement('div');
    row.className = 'output-next-action';

    const text = document.createElement('div');
    text.className = 'output-next-text';
    text.textContent = TextFormatter.formatLine(entry) || `${index + 1}件目の候補`;

    const btn = document.createElement('button');
    btn.className = 'gcal-add-btn';
    btn.type = 'button';
    btn.textContent = 'Googleカレンダーに登録';
    btn.addEventListener('click', () => {
      window.open(buildGcalEventUrl(entry), '_blank', 'noopener,noreferrer');
    });

    row.append(text, btn);
    actionList.appendChild(row);
  });

  if (state.size === 0) {
    el.innerHTML = '<span class="output-placeholder">日付と時間を入力すると、ここにテキストが表示されます</span>';
    return;
  }

  const text = TextFormatter.formatEntries(state);
  if (!text) {
    el.innerHTML = '<span class="output-placeholder">時間を入力してください（終了 > 開始）</span>';
  } else {
    el.textContent = text;
  }
}

// ── Copy ─────────────────────────────────────────────────────
document.getElementById('copyBtn').addEventListener('click', async () => {
  const text = document.getElementById('outputText').textContent.trim();
  if (!text || document.querySelector('.output-placeholder')) return;

  const btn = document.getElementById('copyBtn');
  try {
    await navigator.clipboard.writeText(text);
    btn.textContent = 'コピーしました！';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'コピー';
      btn.classList.remove('copied');
    }, 2000);
  } catch {
    // Fallback: select text
    const range = document.createRange();
    range.selectNode(document.getElementById('outputText'));
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    btn.textContent = 'テキストを選択しました';
    setTimeout(() => { btn.textContent = 'コピー'; }, 2000);
  }
});

document.querySelector('.output-next-toggle summary').addEventListener('click', (event) => {
  if (getValidCalendarEntries(ScheduleStore.getState()).length === 0) {
    event.preventDefault();
  }
});

document.getElementById('showLateHoursToggle').addEventListener('change', (event) => {
  showLateHours = event.target.checked;
  localStorage.setItem(LATE_HOURS_KEY, String(showLateHours));
  renderDateList();
});

// ── Google Calendar embed ────────────────────────────────────
const GCAL_KEY = 'gcal_embed_url';
const GCAL_TOGGLE_KEY = 'gcal_toggle_open';

function renderGcal() {
  const section = document.getElementById('gcalSection');
  const saved = localStorage.getItem(GCAL_KEY);

  if (saved) {
    section.innerHTML = `
      <div class="gcal-header">
        <span class="gcal-header-label">Google カレンダー</span>
        <button class="gcal-reset-btn" id="gcalResetBtn">URLを変更</button>
      </div>
      <iframe class="gcal-frame" src="${saved}" allowfullscreen></iframe>
    `;
    document.getElementById('gcalResetBtn').addEventListener('click', () => {
      localStorage.removeItem(GCAL_KEY);
      renderGcal();
    });
  } else {
    section.innerHTML = `
      <div class="gcal-setup">
        <p>
          Google カレンダーの埋め込みURLを貼り付けると、このページ内に表示されます。<br>
          取得方法：<a href="https://calendar.google.com/calendar/r/settings" target="_blank">カレンダーの設定</a>
          → 対象カレンダー →「カレンダーの統合」→「埋め込みコード」の <code>src="..."</code> の値をコピー
        </p>
        <div class="gcal-url-row">
          <input class="gcal-url-input" id="gcalUrlInput" type="url"
            placeholder="https://calendar.google.com/calendar/embed?src=...">
          <button class="gcal-save-btn" id="gcalSaveBtn">保存</button>
        </div>
      </div>
    `;
    document.getElementById('gcalSaveBtn').addEventListener('click', () => {
      const url = document.getElementById('gcalUrlInput').value.trim();
      if (url.startsWith('https://calendar.google.com/')) {
        localStorage.setItem(GCAL_KEY, url);
        renderGcal();
      } else {
        document.getElementById('gcalUrlInput').style.borderColor = '#e05';
      }
    });
  }
}

function initGcalToggle() {
  const toggle = document.getElementById('gcalToggle');
  const savedState = localStorage.getItem(GCAL_TOGGLE_KEY);

  toggle.open = savedState === 'true';
  toggle.addEventListener('toggle', () => {
    localStorage.setItem(GCAL_TOGGLE_KEY, String(toggle.open));
  });
}

function initLateHoursToggle() {
  showLateHours = localStorage.getItem(LATE_HOURS_KEY) === 'true';
  document.getElementById('showLateHoursToggle').checked = showLateHours;
}

// ── Init ─────────────────────────────────────────────────────
ScheduleStore.subscribe(renderOutput); // TextOutputPanel subscribes to state changes
initLateHoursToggle();
renderOutput();
renderCalendar();
renderDateList();
initGcalToggle();
renderGcal();
</script>
